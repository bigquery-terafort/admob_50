name: AdMob Sync - Account 2

on:
  schedule:
    - cron: '15 6 * * *'    # 06:15 UTC daily (15 min after account 1)
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to sync (default: 2)'
        required: false
        default: '2'
      backfill_start:
        description: 'Backfill start date (YYYY-MM-DD)'
        required: false
      backfill_end:
        description: 'Backfill end date (YYYY-MM-DD)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-oauthlib google-cloud-bigquery

      - name: Run AdMob Sync - Account 2
        env:
          GCP_PROJECT_ID:        ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_JSON:  ${{ secrets.GCP_CREDENTIALS_JSON }}
          BQ_DATASET_ID:         ${{ secrets.BQ_DATASET_ID }}
          BQ_LOCATION:           ${{ secrets.BQ_LOCATION }}
          ADMOB_REPORT_CURRENCY: ${{ secrets.ADMOB_REPORT_CURRENCY }}
          # Account 2 OAuth (NEW SECRETS)
          ADMOB_PUBLISHER_ID:    ${{ secrets.ADMOB_PUBLISHER_ID_ACCOUNT2 }}
          OAUTH_CLIENT_ID:       ${{ secrets.OAUTH_CLIENT_ID_ACCOUNT2 }}
          OAUTH_CLIENT_SECRET:   ${{ secrets.OAUTH_CLIENT_SECRET_ACCOUNT2 }}
          OAUTH_REFRESH_TOKEN:   ${{ secrets.OAUTH_REFRESH_TOKEN_ACCOUNT2 }}
        run: |
          if [ -n "${{ github.event.inputs.backfill_start }}" ] && [ -n "${{ github.event.inputs.backfill_end }}" ]; then
            python src/admob_full_sync_account2.py \
              --backfill-start "${{ github.event.inputs.backfill_start }}" \
              --backfill-end "${{ github.event.inputs.backfill_end }}"
          else
            python src/admob_full_sync_account2.py \
              --days "${{ github.event.inputs.days_back || '2' }}"
          fi
